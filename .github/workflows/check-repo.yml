name: Advanced URL Analyzer (Repo + File Detector)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Enter GitHub Repo URL"
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze GitHub Repo
        run: |
          set +e

          URL="${{ github.event.inputs.url }}"
          echo "🔍 Checking URL: $URL"
          echo "-----------------------------"

          # Extract username and repo name
          PARTS=$(echo "$URL" | awk -F'github.com/' '{print $2}')
          USER=$(echo "$PARTS" | cut -d'/' -f1)
          REPO=$(echo "$PARTS" | cut -d'/' -f2)

          echo "👤 User: $USER"
          echo "📦 Repo: $REPO"

          echo "-----------------------------"
          echo "🔎 Checking if repo exists..."

          API_URL="https://api.github.com/repos/$USER/$REPO"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $API_URL)

          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Repo EXISTS"
          else
            echo "❌ Repo NOT found or PRIVATE"
            exit 0
          fi

          echo "-----------------------------"
          echo "📂 Fetching files..."

          CONTENTS_URL="https://api.github.com/repos/$USER/$REPO/contents"
          FILES=$(curl -s $CONTENTS_URL)

          echo "-----------------------------"
          echo "📁 Files & Extensions:"

          echo "$FILES" | grep '"name"' | cut -d '"' -f4 | while read file; do
            EXT=$(echo "$file" | grep -oE '\.[a-zA-Z0-9]+$' || true)

            if [ ! -z "$EXT" ]; then
              echo "📄 $file → Extension: $EXT"
            else
              echo "📁 $file → No extension (folder or config)"
            fi
          done

          echo "-----------------------------"
          echo "✅ Analysis Complete"
