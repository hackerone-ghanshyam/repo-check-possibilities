name: URL File Type Detector

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Enter URL to analyze"
        required: true

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Check URL Type
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "Checking URL: $URL"

          # Get headers
          RESPONSE=$(curl -s -I "$URL")

          echo "---- HEADERS ----"
          echo "$RESPONSE"

          # Extract content type
          CONTENT_TYPE=$(echo "$RESPONSE" | grep -i "content-type" | awk '{print $2}')

          echo "Content-Type: $CONTENT_TYPE"

          # Detect file extension from URL
          EXT=$(echo "$URL" | grep -oE '\.[a-zA-Z0-9]+$')

          if [ ! -z "$EXT" ]; then
            echo "Detected file extension: $EXT"
          else
            echo "No file extension found in URL"
          fi

          # Extra detection
          if [[ "$CONTENT_TYPE" == *"text/html"* ]]; then
            echo "This is likely a webpage"
          elif [[ "$CONTENT_TYPE" == *"application/json"* ]]; then
            echo "This is a JSON file"
          elif [[ "$CONTENT_TYPE" == *"text/plain"* ]]; then
            echo "This is a text file"
          elif [[ "$CONTENT_TYPE" == *"application/x-yaml"* ]]; then
            echo "This is a YAML file"
          elif [[ "$CONTENT_TYPE" == *"python"* ]]; then
            echo "This might be a Python file"
          else
            echo "Unknown or binary file type"
          fi
