name: URL Analyzer (File / Repo / Type Detector)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Enter URL to analyze"
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze URL
        run: |
          set +e

          URL="${{ github.event.inputs.url }}"
          echo "🔍 Checking URL: $URL"
          echo "-----------------------------"

          # Get headers safely
          RESPONSE=$(curl -s -I "$URL")

          echo "📦 HEADERS:"
          echo "$RESPONSE"
          echo "-----------------------------"

          # Extract Content-Type safely
          CONTENT_TYPE=$(echo "$RESPONSE" | grep -i "^content-type:" | head -n 1 | cut -d':' -f2- | xargs || echo "unknown")

          echo "📄 Content-Type: $CONTENT_TYPE"

          # Extract extension safely
          EXT=$(echo "$URL" | grep -oE '\.[a-zA-Z0-9]+$' || true)

          if [ ! -z "$EXT" ]; then
            echo "📁 File Extension Detected: $EXT"
          else
            echo "📁 No file extension in URL"
          fi

          echo "-----------------------------"
          echo "🧠 Smart Detection Result:"

          # Detect GitHub repo / file
          if [[ "$URL" == *"github.com"* && "$URL" != *"raw.githubusercontent.com"* ]]; then
            echo "👉 This is a GitHub Repository or Directory page"
          fi

          if [[ "$URL" == *"raw.githubusercontent.com"* ]]; then
            echo "👉 This is a Raw GitHub File"
          fi

          # Detect by content type
          if [[ "$CONTENT_TYPE" == *"text/html"* ]]; then
            echo "👉 This is a Webpage (HTML)"
          elif [[ "$CONTENT_TYPE" == *"application/json"* ]]; then
            echo "👉 This is a JSON file"
          elif [[ "$CONTENT_TYPE" == *"text/plain"* ]]; then
            echo "👉 This is a Text file"
          elif [[ "$CONTENT_TYPE" == *"yaml"* ]]; then
            echo "👉 This is a YAML file"
          elif [[ "$CONTENT_TYPE" == *"python"* ]]; then
            echo "👉 This might be a Python file"
          else
            echo "👉 Unknown or Binary file"
          fi

          echo "-----------------------------"
          echo "✅ Analysis Complete"
