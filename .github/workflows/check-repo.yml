name: Repo Full Analyzer (Public + Private + Files)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Enter GitHub Repo URL"
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Repo
        run: |
          set +e

          URL="${{ github.event.inputs.url }}"
          TOKEN="${{ secrets.GH_TOKEN }}"

          echo "🔍 Checking URL: $URL"
          echo "-----------------------------"

          # Extract USER and REPO
          PARTS=$(echo "$URL" | awk -F'github.com/' '{print $2}')
          USER=$(echo "$PARTS" | cut -d'/' -f1)
          REPO=$(echo "$PARTS" | cut -d'/' -f2)

          echo "👤 User: $USER"
          echo "📦 Repo: $REPO"

          echo "-----------------------------"

          # API call with token
          RESPONSE=$(curl -s -H "Authorization: token $TOKEN" \
          https://api.github.com/repos/$USER/$REPO)

          EXISTS=$(echo "$RESPONSE" | grep '"full_name"' || true)

          if [ -z "$EXISTS" ]; then
            echo "❌ Repo NOT found or NO ACCESS"
            exit 0
          fi

          # Check private or public
          PRIVATE=$(echo "$RESPONSE" | grep '"private": true')

          if [ ! -z "$PRIVATE" ]; then
            echo "🔒 Repo is PRIVATE"
          else
            echo "🔓 Repo is PUBLIC"
          fi

          echo "-----------------------------"
          echo "📂 Fetching files..."

          CONTENTS=$(curl -s -H "Authorization: token $TOKEN" \
          https://api.github.com/repos/$USER/$REPO/contents)

          echo "-----------------------------"
          echo "📁 Files & Extensions:"

          echo "$CONTENTS" | grep '"name"' | cut -d '"' -f4 | while read file; do
            EXT=$(echo "$file" | grep -oE '\.[a-zA-Z0-9]+$' || true)

            if [ ! -z "$EXT" ]; then
              echo "📄 $file → $EXT"
            else
              echo "📁 $file → folder/no extension"
            fi
          done

          echo "-----------------------------"
          echo "✅ Report Ready"
